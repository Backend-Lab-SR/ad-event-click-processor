services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEBUG: 0

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: adtech
      POSTGRES_PASSWORD: adtech
      POSTGRES_DB: ad_events
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
